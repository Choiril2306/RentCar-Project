name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Node.js untuk mengeksekusi system_test.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    # Setup Java untuk Backend Engine
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Setup PHP dan Xdebug untuk Frontend & Perhitungan Metrik
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: json, curl, mbstring, xdebug
        coverage: xdebug

    # --- TAMBAHAN UNTUK MEMPERBAIKI ERROR PHPUNIT ---
    - name: Install Composer Dependencies
      run: |
        cd frontend
        composer install

    - name: Run System Test (PHPUnit)
      run: |
        cd frontend
        chmod +x ./vendor/bin/phpunit
        ./vendor/bin/phpunit
    # ------------------------------------------------

    # Jalankan Backend Java di Latar Belakang (Port 8080)
    - name: Run Java Backend
      run: |
        cd backend
        javac RentCarBackend.java
        java RentCarBackend &

    # Jalankan Frontend PHP di Latar Belakang (Port 8000)
    - name: Start PHP Web Server
      run: |
        cd frontend
        php -S localhost:8000 &

    # Beri waktu 5 detik bagi kedua server untuk menyala
    - name: Wait for Servers to Boot
      run: sleep 5

    # Eksekusi System Test (JavaScript) untuk menguji skenario transaksi sewa
    - name: Run System Integration Test
      run: node system_test.js

    # Eksekusi dan Tampilkan Laporan Hasil Hitung Analisis Metrik Kualitas Kode
    - name: Verify Quality Code Coverage Metrics
      run: php coverage_metrics.php