name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    # Perbaikan: Beri izin eksekusi untuk Playwright agar tidak error 127
    - name: Install Playwright Browser
      run: |
        chmod +x ./node_modules/.bin/playwright
        npx playwright install --with-deps chromium

    # Setup Java untuk Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Setup PHP 8.3 (Dinaikkan dari 8.2 agar sesuai requirement PHPUnit 12)
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: json, curl, mbstring, xdebug
        coverage: xdebug

    # Perbaikan: Install composer dan beri izin eksekusi untuk PHPUnit
    - name: Install Composer Dependencies
      run: |
        cd frontend
        composer install

    - name: Run System Test (PHPUnit)
      run: |
        cd frontend
        chmod +x ./vendor/bin/phpunit
        ./vendor/bin/phpunit

    # Jalankan Backend Java di Latar Belakang
    - name: Run Java Backend
      run: |
        cd backend
        javac RentCarBackend.java
        java RentCarBackend &

    # Jalankan Frontend PHP di Latar Belakang
    - name: Start PHP Web Server
      run: |
        cd frontend
        php -S localhost:8000 &

    # Beri waktu bagi server untuk menyala
    - name: Wait for Servers to Boot
      run: sleep 5

    # Eksekusi System Test (JavaScript)
    - name: Run System Integration Test
      run: node system_test.js

    # Eksekusi Analisis Metrik
    - name: Verify Quality Code Coverage Metrics
      run: php coverage_metrics.php