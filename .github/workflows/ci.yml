name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    # Perbaikan: Beri izin eksekusi untuk Playwright agar tidak error 127
    - name: Install Playwright Browser
      run: |
        chmod +x ./node_modules/.bin/playwright
        npx playwright install --with-deps chromium

    # Setup Java untuk Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Setup PHP 8.3 (Dinaikkan dari 8.2 agar sesuai requirement PHPUnit 12)
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: json, curl, mbstring, xdebug
        coverage: xdebug

    # Perbaikan: Install composer dan beri izin eksekusi untuk PHPUnit
    - name: Install Composer Dependencies
      run: |
        cd frontend
        composer install

    - name: Run System Test (PHPUnit)
      run: |
        cd frontend
        chmod +x ./vendor/bin/phpunit
        ./vendor/bin/phpunit

    # Jalankan Server & System Test dalam satu step (biar background process tetap hidup)
    - name: Run Servers and Integration Test
      run: |
        cd backend
        javac RentCarBackend.java
        java RentCarBackend &
        JAVA_PID=$!

        cd ../frontend
        php -S localhost:8000 &
        PHP_PID=$!

        sleep 5

        cd ..
        node system_test.js
        EXIT_CODE=$?

        kill $JAVA_PID $PHP_PID 2>/dev/null
        exit $EXIT_CODE

    # Eksekusi Analisis Metrik
    - name: Verify Quality Code Coverage Metrics
      run: php coverage_metrics.php