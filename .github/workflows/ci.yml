name: Continuous Integration Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependency Node.js
      - name: Install Node Dependencies
        run: npm install

      # Install Playwright + Chromium Browser
      - name: Install Playwright Browser
        run: |
          npx playwright install --with-deps chromium

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Setup PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: json,curl,mbstring,xdebug
          coverage: xdebug

      # Compile Backend Java
      - name: Compile Java Backend
        run: |
          cd backend
          javac RentCarBackend.java

      # Jalankan Backend Java
      - name: Run Java Backend
        run: |
          cd backend
          nohup java RentCarBackend > backend.log 2>&1 &
          sleep 3

      # Jalankan PHP Server
      - name: Start PHP Web Server
        run: |
          cd frontend
          nohup php -S localhost:8000 > php.log 2>&1 &
          sleep 3

      # Tunggu server siap
      - name: Wait for Servers to Boot
        run: sleep 10

      # Verifikasi Backend
      - name: Verify Backend Running
        run: |
          curl http://localhost:8080 || true

      # Verifikasi Frontend
      - name: Verify Frontend Running
        run: |
          curl http://localhost:8000 || true

      # Jalankan System Test
      - name: Run System Integration Test
        run: node system_test.js

      # Jalankan Analisis Metrik Kualitas
      - name: Verify Quality Code Coverage Metrics
        run: php coverage_metrics.php